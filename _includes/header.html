<head>
    <meta charset="utf-8">
    <title>{{ page.title }}</title>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.13.0/css/all.css">
    <!--Font Stuff-->
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300&display=swap" rel="stylesheet">
    <link href='https://fonts.googleapis.com/css?family=Inconsolata:400,700' rel='stylesheet' type='text/css'> 
    <link rel="stylesheet" type="text/css" href="{{site.baseurl}}/assets/css/main.css">
    <link rel="icon" type="image/x-icon" href="{{site.baseurl}}/favicon.ico">
    <script>
      window.addEventListener('DOMContentLoaded', (event) => {
        const modeIcon = document.getElementById('mode-icon');

        // Load the saved mode from local storage
        if (localStorage.getItem('mode') === 'dark') {
          document.body.classList.add('dark-mode');
          modeIcon.classList.replace('fa-moon', 'fa-sun');
        }

        modeIcon.addEventListener('click', () => {
          document.body.classList.toggle('dark-mode');
          if (document.body.classList.contains('dark-mode')) {
            modeIcon.classList.replace('fa-moon', 'fa-sun');
            localStorage.setItem('mode', 'dark');
          } else {
            modeIcon.classList.replace('fa-sun', 'fa-moon');
            localStorage.setItem('mode', 'light');
          }
        });
      });
    </script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const boxes = document.querySelectorAll('.theorem-box');
        console.log('found boxes:', boxes.length);
      
        boxes.forEach(box => {
          const buttons = box.querySelectorAll('.toggle-btn');
          const concept = box.querySelector('.conceptual');
          const tech    = box.querySelector('.technical');
      
          buttons.forEach(btn => {
            btn.addEventListener('click', () => {
              buttons.forEach(b => b.classList.remove('active'));
              btn.classList.add('active');
              if (btn.dataset.mode === 'conceptual') {
                concept.style.display = 'block';
                tech.style.display = 'none';
              } else {
                concept.style.display = 'none';
                tech.style.display = 'block';
              }
            });
          });
        });
      });
      </script>
    {% if page.katex %}
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
      <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
      <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
      <script>
        (function(){
          const orig = window.renderMathInElement;
          window.renderMathInElement = function(el, opts){
            console.log(
              "[KaTeX] renderMathInElement called",
              { hasMacros: !!(opts && opts.macros), opts }
            );
            return orig(el, opts);
          };
        })();
      </script>
      <style>.katex{ font-size:1.0em; }</style>
      <script>
        // Initialize KaTeX after the page AND scripts are loaded
        window.katexMacros = {
          "\\rr": "\\mathbb{R}",
          "\\cc": "\\mathbb{C}",
          "\\qq": "\\mathbb{Q}",
          "\\ccc": "\\mathcal{C}",
          "\\dd": "\\mathrm{d}"
        };
        console.log("[KaTeX] Initializing with macros", window.katexMacros);
        window.addEventListener('load', function () {
          renderMathInElement(document.body, {
            macros: window.katexMacros,
            delimiters: [
              { left: "$$", right: "$$", display: true },
              { left: "\\[", right: "\\]", display: true },
              { left: "$",  right: "$",  display: false },
              { left: "\\(", right: "\\)", display: false }
            ]
          });
        });
      </script>
    {% endif %}
    
</head>
